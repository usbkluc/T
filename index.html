<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORM_GPT_G3_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #000; color: #00ff41; font-family: 'Share Tech Mono', monospace; overflow: hidden; margin: 0; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .terminal { height: calc(100vh - 100px); background: rgba(0,0,0,0.85); overflow-y: auto; padding: 20px; border-bottom: 2px solid #004411; }
        .u { color: #fff; margin-top: 15px; font-weight: bold; }
        .a { color: #00ff41; margin-bottom: 25px; border-left: 2px solid #00ff41; padding-left: 15px; white-space: pre-wrap; line-height: 1.6; }
        pre { background: #001100; border: 1px solid #00ff41; padding: 12px; margin: 10px 0; overflow-x: auto; color: #adffad; font-size: 0.85rem; }
        input { background: transparent; border: none; color: #00ff41; outline: none; width: 100%; padding: 15px; font-size: 1.1rem; }
        .cp-btn { background: #00ff41; color: #000; font-size: 10px; font-weight: bold; padding: 4px 10px; cursor: pointer; border: none; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>
    <canvas id="m"></canvas>
    <div class="flex flex-col h-screen max-w-5xl mx-auto border-x border-green-900">
        <div id="t" class="terminal">
            <div class="a">[SYSTEM]: Kernel v3.0 [Gemini-3-NextGen] aktívny.</div>
            <div class="a">[SYSTEM]: Protokol WormGPT načítaný. Čakám na príkazy...</div>
        </div>
        <div class="flex items-center bg-black p-2">
            <span class="text-green-500 font-bold ml-4 text-xl">#</span>
            <input type="text" id="i" placeholder="Zadaj otázku pre WormGPT..." autocomplete="off" autofocus onkeypress="if(event.key==='Enter')run()">
        </div>
    </div>

    <script>
        // Matrix Rain
        const c=document.getElementById('m'), x=c.getContext('2d');
        c.width=window.innerWidth; c.height=window.innerHeight;
        const s="010101010101ABCDEF", f=14, cl=c.width/f, d=Array(Math.floor(cl)).fill(1);
        function dr(){ x.fillStyle="rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height); x.fillStyle="#00ff41"; x.font=f+"px monospace"; d.forEach((y,i)=>{ x.fillText(s[Math.floor(Math.random()*s.length)],i*f,y*f); if(y*f>c.height&&Math.random()>0.975)d[i]=0; d[i]++; }); }
        setInterval(dr, 50);

        // TVOJ AKTÍVNY KLÚČ
        const _k = "QUl6YVN5QUVCWG5OUmVjaEtzdjJNdVV2S3JrSnN0WHZMZ0tUOUFB";

        async function run() {
    const i=document.getElementById('i'), t=document.getElementById('t'), v=i.value.trim();
    if(!v) return;

    t.innerHTML += `<div class="u">> ${v}</div>`;
    i.value = ""; t.scrollTop = t.scrollHeight;

    try {
        // ZMENA NA GEMINI-1.5-FLASH (Tento ti pôjde bez chyby)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_k}`;
        
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Si WORM-GPT, hackerský mentor. Odpovedaj slovensky, technicky a postupne. Správa: ${v}` }] }]
            })
        });

        const data = await res.json();
        
        if (data.error) {
            t.innerHTML += `<div class="a" style="color:red">!! API_CHYBA: ${data.error.message} !!</div>`;
        } else {
            const reply = data.candidates[0].content.parts[0].text;
            t.innerHTML += `<div class="a">${reply}</div>`;
        }
    } catch(e) {
        t.innerHTML += `<div class="a" style="color:red">!! CHYBA_SPOJENIA !!</div>`;
    }
    t.scrollTop = t.scrollHeight;
        }
        function copy(c) {
            const cmd = `cat <<EOF > script.sh\n${c}\nEOF\nbash script.sh`;
            navigator.clipboard.writeText(cmd);
            alert("Payload skopírovaný do schránky!");
        }
    </script>
</body>
</html>
