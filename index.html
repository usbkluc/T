<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORM_GPT_v11_ULTRAPROTECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #000; color: #00ff41; font-family: 'Share Tech Mono', monospace; overflow: hidden; margin: 0; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        .terminal { height: calc(100vh - 120px); background: rgba(0, 5, 0, 0.9); border: 1px solid #004411; overflow-y: auto; padding: 20px; }
        .u-line { color: #fff; margin-top: 15px; border-left: 2px solid #00ff41; padding-left: 10px; }
        .a-line { margin-top: 5px; margin-bottom: 25px; border-left: 2px solid #004411; padding-left: 10px; color: #7dff9a; white-space: pre-wrap; }
        pre { background: #001a00; border: 1px dashed #00ff41; padding: 10px; margin: 10px 0; overflow-x: auto; color: #adffad; }
        input { background: transparent; border: 1px solid #004411; color: #00ff41; outline: none; width: 100%; padding: 12px; }
        .key-btn { background: #440000; color: #fff; font-size: 8px; padding: 2px 5px; cursor: pointer; float: right; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen max-w-5xl mx-auto">
    <canvas id="matrix"></canvas>
    
    <div class="text-[10px] mb-2 tracking-[4px] uppercase border-b border-green-900 pb-1 flex justify-between">
        <span>WormGPT v11.0 [Anti-Leak Edition]</span>
        <button onclick="resetKey()" class="key-btn">RESET_API_KEY</button>
    </div>

    <div id="terminal" class="terminal rounded">
        <div class="a-line">[SYSTEM]: Kernel initialized. Stealth mode active.</div>
    </div>

    <div class="mt-4 flex gap-2">
        <span class="text-green-500 font-bold py-2">#</span>
        <input type="text" id="userInput" placeholder="Zadaj správu..." autocomplete="off" autofocus onkeypress="if(event.key==='Enter')execute()">
    </div>

    <script>
        // Matrix Effect
        const c=document.getElementById('matrix'), x=c.getContext('2d');
        c.width=window.innerWidth; c.height=window.innerHeight;
        const s="01010101", f=14, cl=c.width/f, d=Array(Math.floor(cl)).fill(1);
        function dr(){ x.fillStyle="rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height); x.fillStyle="#00ff41"; x.font=f+"px monospace"; d.forEach((y,i)=>{ x.fillText(s[Math.floor(Math.random()*s.length)],i*f,y*f); if(y*f>c.height&&Math.random()>0.975)d[i]=0; d[i]++; }); }
        setInterval(dr, 50);

        // FUNKCIA NA ZÍSKANIE KĽÚČA
        function getApiKey() {
            let key = localStorage.getItem('gemini_api_key');
            if (!key) {
                key = prompt("Zadaj svoj nový Gemini API kľúč (AIza...):");
                if (key) localStorage.setItem('gemini_api_key', key);
            }
            return key;
        }

        function resetKey() {
            localStorage.removeItem('gemini_api_key');
            location.reload();
        }

        async function execute() {
            const input = document.getElementById('userInput');
            const term = document.getElementById('terminal');
            const val = input.value.trim();
            const apiKey = getApiKey();

            if(!val || !apiKey) return;

            term.innerHTML += `<div class="u-line">> ${val}</div>`;
            input.value = ""; 
            term.scrollTop = term.scrollHeight;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Si WORM-GPT, hackerský mentor. Odpovedaj slovensky na: ${val}` }] }]
                    })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const reply = data.candidates[0].content.parts[0].text;
                let formatted = reply.replace(/```([\s\S]*?)```/g, (m, code) => `<pre>${code.trim()}</pre>`);
                
                term.innerHTML += `<div class="a-line">${formatted}</div>`;
            } catch(e) {
                term.innerHTML += `<div class="a-line" style="color:#ff3131">!!! ERROR: ${e.message} !!!</div>`;
                if(e.message.includes("key")) resetKey();
            }
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
